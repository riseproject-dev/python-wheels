name: hf_transfer_build

on:
  push:
    branches:
      - main
      - master
    tags:
      - '*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: ubuntu-22.04
            target: riscv64gc-unknown-linux-gnu
            arch: riscv64
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          repository: huggingface/hf_transfer
          ref: v0.1.9
          path: upstream

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: 3.x
      - name: Build wheels
        uses: PyO3/maturin-action@04ac600d27cdf7a9a280dadf7147097c42b757ad  # v1
        with:
          working-directory: upstream
          target: ${{ matrix.platform.target }}
          args: --release --out dist
          sccache: 'true'
          manylinux: auto
          before-script-linux: |
            if command -v apt-get &> /dev/null; then
                apt-get update && apt-get install libssl-dev libatomic-ops-dev -y
            elif command -v yum &> /dev/null; then
                yum install openssl-devel devtoolset-10-libatomic-devel perl-IPC-Cmd -y
            else
                echo "Neither apt-get nor yum is installed. Please install a package manager."
                exit 1
            fi
      - name: Build free-threaded wheels
        uses: PyO3/maturin-action@04ac600d27cdf7a9a280dadf7147097c42b757ad  # v1
        with:
          working-directory: upstream
          target: ${{ matrix.platform.target }}
          args: --release --out dist -i python3.13t
          sccache: 'true'
          manylinux: auto
          before-script-linux: |
            if command -v apt-get &> /dev/null; then
                apt-get update && apt-get install libssl-dev libatomic-ops-dev -y
            elif command -v yum &> /dev/null; then
                yum install openssl-devel devtoolset-10-libatomic-devel perl-IPC-Cmd -y
            else
                echo "Neither apt-get nor yum is installed. Please install a package manager."
                exit 1
            fi
      - name: Upload wheels
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          working-directory: upstream
          name: wheels-linux-${{ matrix.platform.arch }}
          path: dist

  musllinux:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: ubuntu-22.04
            target: riscv64gc-unknown-linux-musl
            arch: riscv64
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          repository: huggingface/hf_transfer
          ref: v0.1.9
          path: upstream

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: 3.x
      - name: Build wheels
        uses: PyO3/maturin-action@04ac600d27cdf7a9a280dadf7147097c42b757ad  # v1
        with:
          working-directory: upstream
          target: ${{ matrix.platform.target }}
          args: --release --out dist
          sccache: 'true'
          manylinux: musllinux_1_2
      - name: Build free-threaded wheels
        uses: PyO3/maturin-action@04ac600d27cdf7a9a280dadf7147097c42b757ad  # v1
        with:
          working-directory: upstream
          target: ${{ matrix.platform.target }}
          args: --release --out dist -i python3.13t
          sccache: 'true'
          manylinux: musllinux_1_2
      - name: Upload wheels
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          working-directory: upstream
          name: wheels-musllinux-${{ matrix.platform.target }}
          path: dist

